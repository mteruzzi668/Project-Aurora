<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Gallery | Marco Teruzzi</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

    <link rel="stylesheet"
          href="css/gallery.css">

</head>

<body>

<header id="header">

    <div class="logo">

        <a href="index.html">

            MT

        </a>

    </div>

    <nav>

        <a href="index.html">

            Home

        </a>

        <a href="portfolio.html">

            Portfolio

        </a>

        <a href="about.html">

            About

        </a>

        <a href="contact.html">

            Contact

        </a>

    </nav>

</header>

<!-- ====================================== -->

<section class="galleryHero">

    <div class="galleryHeroOverlay"></div>

    <div class="galleryHeroContent">

        <span>

            COLLECTION

        </span>

        <h1 id="galleryTitle">

            Loading...

        </h1>

        <p id="galleryDescription">

            Loading gallery...

        </p>

    </div>

</section>

<!-- ====================================== -->

<section class="galleryContainer">

    <div
        id="photoGrid"
        class="photoGrid">

    </div>

</section>

<!-- ====================================== -->

<div
    id="lightbox"
    class="lightbox hidden">

    <span
        id="closeLightbox">

        ×

    </span>

    <button
        id="prevPhoto"
        class="lightboxArrow">

        ❮

    </button>

    <img
        id="lightboxImage"
        src="">

    <button
        id="nextPhoto"
        class="lightboxArrow">

        ❯

    </button>

    <div
        class="lightboxInfo">

        <h2 id="photoTitle">

        </h2>

        <p id="photoLocation">

        </p>

    </div>

</div>
<footer>

    <div class="footer-content">

        <div class="footer-logo">

            Marco Teruzzi

        </div>

        <div class="footer-text">

            Nature Photographer

        </div>

        <div class="footer-copy">

            © 2026 Marco Teruzzi

        </div>

    </div>

</footer>

<!-- ====================================== -->
<!-- JAVASCRIPT -->
<!-- ====================================== -->

<script src="js/main.js"></script>

<script src="js/photos.js"></script>

<script src="js/gallery.js"></script>

</body>

</html>
